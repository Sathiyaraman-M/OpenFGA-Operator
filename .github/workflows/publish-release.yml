name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release OpenFGA Operator
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: "ghcr.io/sathiyaraman-m/openfga-operator"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version
        run: |
          echo "VERSION_NO_V=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build and Push Operator Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ env.VERSION_NO_V }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: |
          helm lint charts/openfga-operator

      - name: Helm Template Validation
        run: |
          helm template release charts/openfga-operator > rendered.yaml

      - name: Package Helm Chart
        run: |
          helm package charts/openfga-operator \
            --version "${VERSION_NO_V}" \
            --app-version "${VERSION_NO_V}"

      - name: Login Helm to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push Helm Chart
        run: |
          helm push \
            openfga-operator-${VERSION_NO_V}.tgz \
            oci://ghcr.io/sathiyaraman-m/charts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            openfga-operator-${VERSION_NO_V}.tgz
