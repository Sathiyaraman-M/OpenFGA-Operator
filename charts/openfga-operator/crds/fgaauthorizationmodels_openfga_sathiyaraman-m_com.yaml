apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fgaauthorizationmodels.openfga.sathiyaraman-m.com
spec:
  group: openfga.sathiyaraman-m.com
  names:
    kind: FgaAuthorizationModel
    listKind: FgaAuthorizationModelList
    plural: fgaauthorizationmodels
    singular: fgaauthorizationmodel
  scope: Cluster
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              modelDsl:
                description: FGA Model Content in DSL format
                type: string
              storeRef:
                properties:
                  name:
                    description: Name of the Target OpenFGA Store
                    type: string
                required:
                - name
                type: object
            required:
            - modelDsl
            type: object
          status:
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  type: object
                type: array
              modelId:
                description: Model ID for the current OpenFGA Authorization Model
                type: string
              observedModelHash:
                description: SHA256 Hash for the current OpenFGA Authorization Model
                type: string
              storeId:
                description: Store ID for the OpenFGA Store associated with the Authorization Model
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}