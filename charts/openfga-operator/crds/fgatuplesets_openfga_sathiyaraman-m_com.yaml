apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fgatuplesets.openfga.sathiyaraman-m.com
spec:
  group: openfga.sathiyaraman-m.com
  names:
    kind: FgaTupleSet
    listKind: FgaTupleSetList
    plural: fgatuplesets
    singular: fgatupleset
  scope: Cluster
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              storeRef:
                properties:
                  name:
                    description: Name of the Target OpenFGA Store
                    type: string
                required:
                - name
                type: object
              tuples:
                items:
                  properties:
                    object:
                      type: string
                    relation:
                      type: string
                    user:
                      type: string
                  required:
                  - object
                  - relation
                  - user
                  type: object
                type: array
            type: object
          status:
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  type: object
                type: array
              managedTupleStates:
                description: List of Tuples managed by K8s
                items:
                  properties:
                    hash:
                      description: SHA256 Hash for the tuple
                      type: string
                    object:
                      type: string
                    relation:
                      type: string
                    user:
                      type: string
                  type: object
                type: array
              storeId:
                description: Store ID for the OpenFGA Store associated with the Tuple Set
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}