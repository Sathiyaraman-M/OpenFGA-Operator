apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.name }}-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - create
  - update
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - openfga.sathiyaraman-m.com
  resources:
  - fgaauthorizationmodels
  - fgastores
  - fgatuplesets
  verbs:
  - '*'
- apiGroups:
  - openfga.sathiyaraman-m.com
  resources:
  - fgaauthorizationmodels/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - openfga.sathiyaraman-m.com
  resources:
  - fgaconnectionconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - openfga.sathiyaraman-m.com
  resources:
  - fgastores/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - openfga.sathiyaraman-m.com
  resources:
  - fgatuplesets/status
  verbs:
  - get
  - update
  - patch
