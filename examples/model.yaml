apiVersion: openfga.sathiyaraman-m.com/v1alpha
kind: AuthorizationModel
metadata:
  name: demo-model
spec:
  connectionConfigRef:
    name: openfga-dev
  storeRef:
    name: demo-store
  modelJson: |
    {
      "schema_version": "1.1",
      "type_definitions": [
        { "type": "user" },
        {
          "metadata": {
            "relations": {
              "member": { "directly_related_user_types": [{ "type": "user" }] }
            }
          },
          "relations": { "member": { "this": {} } },
          "type": "group"
        },
        {
          "metadata": {
            "relations": {
              "viewer": {
                "directly_related_user_types": [
                  { "type": "user" },
                  { "relation": "member", "type": "group" }
                ]
              }
            }
          },
          "relations": { "viewer": { "this": {} } },
          "type": "document"
        }
      ]
    }